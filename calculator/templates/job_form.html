{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm max-width-600">
    <h2>Калькулятор новой модели</h2>
    <form method="post" class="mt-3">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
        {% endif %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Рассчитать стоимость и запустить</button>
        <a href="{% url 'job_list' %}" class="btn btn-secondary">В историю</a>
    </form>
</div>
{% endblock %}
