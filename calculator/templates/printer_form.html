{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm max-width-600">
    <h2>{{ title }}</h2>
    <form method="post" class="mt-3">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'printer_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
